[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# URL de conexión — se sobreescribe desde env.py usando variables de entorno
sqlalchemy.url = postgresql://eon:eon_dev_password@localhost:5435/eon_index_clima

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
